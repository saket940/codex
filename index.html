<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gesture Typing System</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:#111;
      color:white;
      overflow:hidden;
    }

    .container{
      position:relative;
      width:100vw;
      height:100vh;
    }

    video{
      position:absolute;
      width:100%;
      height:100%;
      object-fit:cover;
      transform: scaleX(-1);
    }

    canvas{
      position:absolute;
      width:100%;
      height:100%;
      pointer-events:none;
    }

    .text-output{
      position:absolute;
      top:20px;
      left:50%;
      transform:translateX(-50%);
      width:80%;
      min-height:70px;
      background:rgba(0,0,0,0.7);
      border:2px solid #00ffcc;
      border-radius:10px;
      padding:15px;
      font-size:24px;
      color:#00ffcc;
      z-index:10;
    }

    .keyboard{
      position:absolute;
      bottom:20px;
      left:50%;
      transform:translateX(-50%);
      display:grid;
      grid-template-columns:repeat(10,70px);
      gap:10px;
      z-index:10;
    }

    .key{
      width:70px;
      height:70px;
      background:#222;
      border:2px solid #00ffcc;
      border-radius:10px;
      display:flex;
      justify-content:center;
      align-items:center;
      font-size:24px;
      transition:0.2s;
    }

    .key.active{
      background:#00ffcc;
      color:black;
      transform:scale(1.1);
    }

  </style>
</head>

<body>

  <div class="container">

    <!-- Camera Feed -->
    <video id="video" autoplay playsinline></video>

    <!-- Drawing Canvas -->
    <canvas id="canvas"></canvas>

    <!-- Typed Text -->
    <div class="text-output" id="output">
      Start Typing...
    </div>

    <!-- Virtual Keyboard -->
    <div class="keyboard" id="keyboard"></div>

  </div>

  <!-- MediaPipe Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

  <script>

    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    const output = document.getElementById("output");
    const keyboard = document.getElementById("keyboard");

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // Keyboard Letters
    const letters = "QWERTYUIOPASDFGHJKLZXCVBNM".split("");

    let typedText = "";
    let lastKeyTime = 0;

    // Create Keyboard
    letters.forEach(letter => {

      const key = document.createElement("div");
      key.classList.add("key");
      key.innerText = letter;
      key.id = "key-" + letter;

      keyboard.appendChild(key);

    });

    // Open Camera
    async function setupCamera(){

      const stream = await navigator.mediaDevices.getUserMedia({
        video:true
      });

      video.srcObject = stream;

    }

    setupCamera();

    // MediaPipe Hands
    const hands = new Hands({
      locateFile: (file) => {
        return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
      }
    });

    hands.setOptions({
      maxNumHands:1,
      modelComplexity:1,
      minDetectionConfidence:0.7,
      minTrackingConfidence:0.7
    });

    // Detect Results
    hands.onResults(results => {

      ctx.clearRect(0,0,canvas.width,canvas.height);

      // Draw Video Frame
      ctx.drawImage(results.image,0,0,canvas.width,canvas.height);

      if(results.multiHandLandmarks){

        for(const landmarks of results.multiHandLandmarks){

          drawConnectors(ctx, landmarks, HAND_CONNECTIONS,{
            color:"#00ffcc",
            lineWidth:4
          });

          drawLandmarks(ctx, landmarks,{
            color:"#ff0000",
            lineWidth:2
          });

          // Index Finger Tip
          const finger = landmarks[8];

          const x = finger.x * canvas.width;
          const y = finger.y * canvas.height;

          // Draw Pointer
          ctx.beginPath();
          ctx.arc(x,y,15,0,2*Math.PI);
          ctx.fillStyle = "yellow";
          ctx.fill();

          checkKeyPress(x,y);

        }
      }

    });

    // Check Keyboard Collision
    function checkKeyPress(x,y){

      const keys = document.querySelectorAll(".key");

      keys.forEach(key => {

        const rect = key.getBoundingClientRect();

        if(
          x > rect.left &&
          x < rect.right &&
          y > rect.top &&
          y < rect.bottom
        ){

          key.classList.add("active");

          const now = Date.now();

          if(now - lastKeyTime > 700){

            typedText += key.innerText;
            output.innerText = typedText;

            lastKeyTime = now;

          }

        }else{

          key.classList.remove("active");

        }

      });

    }

    // Camera Utility
    const camera = new Camera(video,{
      onFrame: async () => {
        await hands.send({image: video});
      },
      width:1280,
      height:720
    });

    camera.start();

  </script>

</body>
</html>
